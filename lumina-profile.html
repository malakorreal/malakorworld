<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Lumina Evernight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" type="image/x-icon" href="assets/Mlogo (1).ico">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome for Social Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Supabase JS Library -->
  <style>
    :root {
      --primary-yellow: #ffcc00;
      --bg-dark: #0a0a0a;
      --card-bg: rgba(255, 255, 255, 0.03);
      --border-color: rgba(255, 255, 255, 0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Kanit', sans-serif;
      background-color: var(--bg-dark);
      background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary-yellow); }

    .lumina-header {
      width: 100%;
      height: 80px;
      background-color: rgba(0, 0, 0, 0.9);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 40px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .lumina-nav { display: flex; gap: 30px; }
    .lumina-nav a { color: white; text-decoration: none; font-size: 24px; font-weight: 400; transition: opacity 0.2s; }
    .lumina-nav a:hover { opacity: 0.7; }

    .profile-container {
      flex: 1;
      max-width: 1200px;
      margin: 40px auto;
      width: 90%;
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 40px;
    }

    .profile-visual {
      position: relative;
      width: 100%;
      max-width: 500px;
      height: 600px;
      background: #111;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      border: 1px solid var(--border-color);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    .profile-visual img {
      max-height: 100%;
      width: auto;
      object-fit: contain;
      z-index: 2;
      position: relative;
    }

    /* Aura Effect */
    .aura-effect {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at bottom, var(--aura-color, rgba(255, 255, 255, 0.3)) 0%, transparent 70%);
      filter: blur(50px);
      opacity: 0.7;
      animation: pulseAura 3s infinite alternate;
      z-index: 1;
    }
    @keyframes pulseAura {
      0% { transform: scale(0.95); opacity: 0.6; }
      100% { transform: scale(1.05); opacity: 0.8; }
    }

    .profile-details {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .info-card {
      background: rgba(255, 255, 255, 0.03);
      padding: 40px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      backdrop-filter: blur(10px);
    }
    @keyframes shiftGradient {
      0% { background-position: 200% 0%; }
      100% { background-position: -200% 0%; }
    }

    .info-card h2 {
      color: var(--primary-yellow);
      margin-bottom: 20px;
      font-size: 28px;
      letter-spacing: 2px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }

    .grid-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .info-item { display: flex; flex-direction: column; }
    .info-label { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .info-value { font-size: 18px; color: white; }

    .desc-box {
      line-height: 1.8;
      color: #bbb;
      white-space: pre-line;
    }

    .social-btns {
      display: flex;
      gap: 15px;
      margin-top: 30px;
      flex-wrap: wrap;
    }
    .social-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      font-weight: 500;
      font-size: 15px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(5px);
    }
    .social-btn i {
      font-size: 20px;
    }
    .social-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      border-color: rgba(255, 255, 255, 0.3);
    }
    .social-btn.yt:hover {
      background: rgba(255, 0, 0, 0.15);
      border-color: #ff0000;
      color: #ff0000;
    }
    .social-btn.ig:hover {
      background: rgba(225, 48, 108, 0.15);
      border-color: #e1306c;
      color: #e1306c;
    }
    .social-btn.fb:hover {
      background: rgba(24, 119, 242, 0.15);
      border-color: #1877f2;
      color: #1877f2;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 40px;
      padding: 12px 25px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 14px;
      transition: all 0.3s;
    }
    .back-btn:hover {
      background: var(--primary-yellow);
      color: black;
      border-color: var(--primary-yellow);
      transform: translateX(-5px);
    }

    @media (max-width: 900px) {
      .profile-container { grid-template-columns: 1fr; }
      .profile-visual { height: 400px; }
      .lumina-header { justify-content: center; padding: 0 20px; }
      .lumina-nav a { font-size: 18px; }
    }

    .lumina-footer {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: white;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.5;
      z-index: 1000;
      pointer-events: none;
    }

    .animated-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 204, 0, 0.3), transparent);
      background-size: 200% 100%;
      animation: shiftGradient 5s linear infinite;
      margin: 40px 0;
    }

    /* Full-page Preloader */
    #lumina-preloader {
      position: fixed;
      inset: 0;
      background-color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #lumina-preloader.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .yellow-spinner {
      width: 60px;
      height: 60px;
      border: 6px solid rgba(255, 204, 0, 0.1);
      border-top: 6px solid #ffcc00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    .loading-text {
      color: #ffcc00;
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="lumina-preloader">
    <div class="yellow-spinner"></div>
    <p class="loading-text">กำลังโหลด</p>
  </div>

  <header class="lumina-header">
    <nav class="lumina-nav">
      <a href="lumina.html">หน้าหลัก</a>
      <a href="lumina-about.html">เกี่ยวกับ</a>
      <a href="lumina-members.html">สมาชิก</a>
    </nav>
  </header>

  <div class="profile-container">
    <div class="profile-visual">
      <img id="pImg" src="" alt="Profile Image">
      <div class="aura-effect" id="auraEffect"></div>
    </div>
    
    <div class="profile-details">
      <a href="lumina-members.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> ย้อนกลับ
      </a>
      
      <div class="info-card">
        <h2 id="pNick">Nickname</h2>
        <div class="grid-info">
          <div class="info-item"><span class="info-label">ชื่อจริง</span><span class="info-value" id="pReal">-</span></div>
          <div class="info-item"><span class="info-label">อายุ</span><span class="info-value" id="pAge">-</span></div>
          <div class="info-item"><span class="info-label">ระดับชั้น</span><span class="info-value" id="pGrade">-</span></div>
          <div class="info-item"><span class="info-label">บ้าน</span><span class="info-value" id="pRank">-</span></div>
          <div class="info-item"><span class="info-label">สถานะ</span><span class="info-value" id="pStatus">-</span></div>
        </div>
      </div>

      <div class="info-card">
        <h2>STORY / DESCRIPTION</h2>
        <div class="desc-box" id="pDesc">
          ไม่มีข้อมูลคำอธิบาย
        </div>
      </div>

      <div class="social-btns" id="socialContainer">
        <!-- Social buttons will be injected here -->
      </div>
    </div>
  </div>

  <footer class="lumina-footer">
    " © STARLIGHT / Malakor 2025 "
  </footer>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const memberId = parseInt(urlParams.get('id'));
    
    // Cloud Database (Supabase)
    const SUPABASE_URL = 'https://zspygbnnxpfsoxbihaqm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzcHlnYm5ueHBmc294YmloYXFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMDUzMDMsImV4cCI6MjA4NzY4MTMwM30.JcBKs6CjyJGyCZSNGgTM_7eLLSivlJsreWGiFoa4P_A';

    async function loadProfile() {
      const startTime = Date.now();
      const minDisplayTime = 1200; // ลดเวลาเพื่อประหยัดทรัพยากร

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/members?id=eq.${memberId}&select=*`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });
        
        const data = await response.json();
        const member = Array.isArray(data) ? data[0] : null;

        if (!member) {
          alert('ไม่พบข้อมูลสมาชิก');
          window.location.href = 'lumina-members.html';
          return;
        }

        document.title = `${member.nickname} | Lumina Profile`;
        document.getElementById('pImg').src = member.fullImg || member.img;

        // ตั้งค่าสี Aura
        const auraEffect = document.getElementById('auraEffect');
        if (member.auraColor) {
          auraEffect.style.setProperty('--aura-color', member.auraColor);
          auraEffect.style.display = 'block';
        } else {
          auraEffect.style.display = 'none';
        }
        document.getElementById('pNick').textContent = member.nickname;
        document.getElementById('pReal').textContent = member.realname;
        document.getElementById('pAge').textContent = member.age;
        document.getElementById('pGrade').textContent = member.grade;
        document.getElementById('pRank').textContent = member.rank;
        document.getElementById('pStatus').textContent = member.status;

        // ระบบล็อกสตอรี่
        const descBox = document.getElementById('pDesc');
        if (member.isLocked) {
          descBox.innerHTML = `<div style="text-align:center; padding: 20px; color: var(--primary-yellow); border: 1px dashed #444; border-radius: 10px; font-weight: bold; letter-spacing: 5px; font-size: 24px;">
            🔒 LOCK
          </div>`;
        } else {
          descBox.textContent = member.desc || member.description || 'ไม่มีข้อมูลคำอธิบาย';
        }

        // Social Buttons
        const socialContainer = document.getElementById('socialContainer');
        socialContainer.innerHTML = '';
        if (member.social) {
          if (member.social.youtube) {
            socialContainer.innerHTML += `<a href="${member.social.youtube}" target="_blank" class="social-btn yt">
              <i class="fab fa-youtube"></i> YouTube
            </a>`;
          }
          if (member.social.instagram) {
            socialContainer.innerHTML += `<a href="${member.social.instagram}" target="_blank" class="social-btn ig">
              <i class="fab fa-instagram"></i> Instagram
            </a>`;
          }
          if (member.social.facebook) {
            socialContainer.innerHTML += `<a href="${member.social.facebook}" target="_blank" class="social-btn fb">
              <i class="fab fa-facebook-f"></i> Facebook
            </a>`;
          }
        }
      } catch (error) {
        console.error('Fetch Error:', error);
        alert('ไม่สามารถดึงข้อมูลจากเซิร์ฟเวอร์ได้');
      } finally {
        const elapsedTime = Date.now() - startTime;
        const remainingTime = Math.max(0, minDisplayTime - elapsedTime);

        setTimeout(() => {
          const preloader = document.getElementById('lumina-preloader');
          if (preloader) preloader.classList.add('hidden');
        }, remainingTime);
      }
    }

    loadProfile();
  </script>
</body>
</html>
