<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Malakor World</title>
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-pink: #ff80ab; /* สีชมพูหลัก */
      --secondary-pink: #ffc1e3; /* สีชมพูอ่อน */
      --dark-bg: #2a2a3e;
      --light-text: #f0f0f0;
      --border-color: rgba(255, 255, 255, 0.1);
    }
    body {
      margin: 0;
      font-family: 'Mitr', sans-serif;
      background-color: var(--dark-bg);
      color: var(--light-text);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      text-align: center;
    }

    /* Background Pattern */
    body::before {
      content: '✨';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      font-size: 20px;
      color: rgba(255, 255, 255, 0.03);
      animation: floatStars 60s linear infinite;
      z-index: 0;
    }
    @keyframes floatStars {
      from { transform: translateY(0px); }
      to { transform: translateY(-1000px); }
    }

    .container {
      z-index: 1;
      position: relative;
      padding: 50px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 25px;
      border: 1px solid var(--border-color);
      max-width: 550px;
      width: 90%;
    }

    h1 {
      font-size: 110px;
      color: var(--primary-pink);
      margin: 0;
    }

    h2 {
      font-size: 28px;
      margin-top: 10px;
      margin-bottom: 25px;
      letter-spacing: 2px;
      color: var(--light-text);
    }

    p {
      font-size: 18px;
      color: #ccc;
      margin-bottom: 40px;
      line-height: 1.7;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 30px;
      background: var(--primary-pink);
      color: var(--dark-bg);
      text-decoration: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .home-btn:hover {
      transform: translateY(-5px) scale(1.05);
    }

    /* Responsive */
    @media (max-width: 600px) {
      h1 { font-size: 90px; }
      h2 { font-size: 24px; }
      p { font-size: 16px; }
      .home-btn { padding: 12px 25px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>อุ๊ปส์! หาหน้าไม่เจอ</h2>
    <p>ดูเหมือนว่าหน้านี้จะลอยหายไปในอวกาศซะแล้ว กลับบ้านเรากันเถอะนะ!</p>
    <a href="index.html" class="home-btn">กลับสู่หน้าหลัก</a>
  </div>
</body>
</html>
