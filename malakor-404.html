<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Malakor World</title>
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #00bcd4; /* สีฟ้าหลักของ Malakor World */
      --secondary-color: #ff9800; /* สีส้ม */
      --dark-bg: #1a1a1a;
      --light-text: #e0e0e0;
      --border-color: rgba(255, 255, 255, 0.1);
    }
    body {
      margin: 0;
      font-family: 'Kanit', sans-serif;
      background-color: var(--dark-bg);
      color: var(--light-text);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      text-align: center;
    }

    /* Background Pattern (เหมือนหน้าหลัก Malakor) */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: 0;
    }

    .container {
      z-index: 1;
      position: relative;
      padding: 50px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 15px;
      border: 1px solid var(--border-color);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
      max-width: 600px;
      width: 90%;
    }

    h1 {
      font-size: 100px;
      color: var(--primary-color);
      margin: 0;
      letter-spacing: 8px;
      text-shadow: 0 0 15px rgba(0, 188, 212, 0.4);
    }

    h2 {
      font-size: 32px;
      margin-top: 10px;
      margin-bottom: 25px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--secondary-color);
    }

    p {
      font-size: 17px;
      color: #bbb;
      margin-bottom: 35px;
      line-height: 1.6;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: var(--primary-color);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 17px;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(0, 188, 212, 0.3);
    }

    .home-btn:hover {
      transform: translateY(-3px);
      background: var(--secondary-color);
      box-shadow: 0 6px 15px rgba(255, 152, 0, 0.4);
    }

    /* Responsive */
    @media (max-width: 600px) {
      h1 { font-size: 80px; }
      h2 { font-size: 28px; }
      p { font-size: 15px; }
      .home-btn { padding: 12px 24px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>CONNECTION LOST</h2>
    <p>ดูเหมือนว่าคุณจะหลุดออกจากระบบ Malakor World โปรดตรวจสอบเส้นทางอีกครั้ง</p>
    <a href="index.html" class="home-btn">กลับสู่หน้าหลัก Malakor</a>
  </div>
</body>
</html>
